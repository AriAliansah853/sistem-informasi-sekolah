<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <style>
    .box { fill:#f3f7ff; stroke:#3366cc; stroke-width:2px; rx:12; ry:12; }
